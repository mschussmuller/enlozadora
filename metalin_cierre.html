<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cierre del Día — METAL-IN</title>
  <!-- Cache-busting: fuerza recarga en cada visita -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --verde:    #117A65;
      --verde-cl: #D5F5E3;
      --verde-dk: #0E6655;
      --laser:    #1A5276;
      --laser-cl: #D6EAF8;
      --laser-dk: #154360;
      --gris:     #F4F6F7;
      --borde:    #D5D8DC;
      --texto:    #1C2833;
      --sub:      #717D7E;
      --danger:   #C0392B;
      --radius:   12px;
      --sombra:   0 2px 16px rgba(0,0,0,0.08);

      /* Color activo según empresa seleccionada */
      --activo:    #117A65;
      --activo-cl: #D5F5E3;
      --activo-dk: #0E6655;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #EAECEE;
      min-height: 100vh;
      padding: 24px 16px 48px;
      color: var(--texto);
      transition: background 0.3s;
    }
    body.laser-mode  { background: #EAF4FB; }
    body.corte-mode  { background: #E9F7EF; }

    .header {
      background: linear-gradient(135deg, #2C3E50 0%, #1A252F 100%);
      border-radius: var(--radius);
      padding: 28px 24px 22px;
      margin-bottom: 24px;
      color: #fff;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      transition: background 0.4s;
    }
    .header.laser-hdr { background: linear-gradient(135deg, var(--laser) 0%, var(--laser-dk) 100%); box-shadow: 0 4px 20px rgba(26,82,118,0.3); }
    .header.corte-hdr { background: linear-gradient(135deg, var(--verde) 0%, var(--verde-dk) 100%); box-shadow: 0 4px 20px rgba(17,122,101,0.3); }
    .header .emoji { font-size: 2.4rem; margin-bottom: 8px; display: block; }
    .header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.3px; }
    .header p  { font-size: 0.9rem; opacity: 0.85; margin-top: 4px; }

    /* ── Selector empresa ── */
    .empresa-selector {
      background: #fff;
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 16px;
      box-shadow: var(--sombra);
    }
    .empresa-selector .lbl {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--sub);
      margin-bottom: 12px;
      display: block;
    }
    .empresa-btns { display: flex; gap: 12px; }
    .emp-btn {
      flex: 1;
      border: 2px solid var(--borde);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      background: #fff;
      color: var(--sub);
    }
    .emp-btn input { display: none; }
    .emp-btn.laser-sel  { border-color: var(--laser);  background: var(--laser-cl);  color: var(--laser-dk); }
    .emp-btn.corte-sel  { border-color: var(--verde);  background: var(--verde-cl);  color: var(--verde-dk); }

    .card {
      background: #fff;
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: var(--sombra);
      border-left: 4px solid #BDC3C7;
      transition: border-color 0.3s;
    }
    .card.laser-card { border-left-color: var(--laser); }
    .card.corte-card { border-left-color: var(--verde); }

    .card-title {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--sub);
      margin-bottom: 18px;
      transition: color 0.3s;
    }
    .card-title.laser-t { color: var(--laser); }
    .card-title.corte-t { color: var(--verde); }

    .campo { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--sub);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    label .req { color: var(--danger); margin-left: 2px; }

    input[type="text"],
    input[type="date"],
    input[type="number"],
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--borde);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--texto);
      background: #FDFEFE;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--laser);
      box-shadow: 0 0 0 3px rgba(26,82,118,0.12);
      background: #fff;
    }
    body.corte-mode input:focus, body.corte-mode textarea:focus {
      border-color: var(--verde);
      box-shadow: 0 0 0 3px rgba(17,122,101,0.12);
    }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 500px) { .grid2 { grid-template-columns: 1fr; } }

    /* ── Saldo final destacado ── */
    .saldo-final-box {
      background: #F8F9FA;
      border: 2px solid var(--borde);
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      transition: background 0.3s, border-color 0.3s;
    }
    .saldo-final-box.laser-sf { background: var(--laser-cl); border-color: var(--laser); }
    .saldo-final-box.corte-sf { background: var(--verde-cl); border-color: var(--verde); }
    .saldo-final-box .sf-lbl { font-size: 0.9rem; font-weight: 600; color: var(--sub); }
    .saldo-final-box .sf-val { font-size: 1.5rem; font-weight: 700; color: var(--texto); }
    .saldo-final-box.laser-sf .sf-val { color: var(--laser-dk); }
    .saldo-final-box.corte-sf .sf-val { color: var(--verde-dk); }

    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #2C3E50 0%, #1A252F 100%);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.2s, transform 0.15s, background 0.3s;
      box-shadow: 0 4px 14px rgba(0,0,0,0.2);
    }
    .btn.laser-btn { background: linear-gradient(135deg, var(--laser) 0%, var(--laser-dk) 100%); box-shadow: 0 4px 14px rgba(26,82,118,0.3); }
    .btn.corte-btn { background: linear-gradient(135deg, var(--verde) 0%, var(--verde-dk) 100%); box-shadow: 0 4px 14px rgba(17,122,101,0.3); }
    .btn:active { transform: scale(0.98); opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .exito {
      display: none;
      background: #fff;
      border-radius: var(--radius);
      padding: 40px 24px;
      text-align: center;
      box-shadow: var(--sombra);
      border-top: 5px solid var(--verde);
    }
    .exito.laser-ex { border-top-color: var(--laser); }
    .exito.corte-ex { border-top-color: var(--verde); }
    .exito .big-icon { font-size: 3.5rem; margin-bottom: 12px; }
    .exito h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
    .exito p  { font-size: 0.9rem; color: var(--sub); margin-bottom: 24px; }
    .btn-otro {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      border: 2px solid;
    }
    .btn-otro.laser-ot { background: var(--laser-cl); color: var(--laser-dk); border-color: var(--laser); }
    .btn-otro.corte-ot { background: var(--verde-cl); color: var(--verde-dk); border-color: var(--verde); }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ocultar formulario hasta seleccionar empresa */
    #form-cuerpo { display: none; }
  </style>
</head>
<body>

<div id="formulario">
  <div class="header" id="header">
    <span class="emoji">📊</span>
    <h1>Cierre del Día — METAL-IN</h1>
    <p>Completar al final de cada día</p>
  </div>

  <!-- SELECTOR EMPRESA -->
  <div class="empresa-selector">
    <span class="lbl">🏭 ¿Qué empresa estás cerrando?</span>
    <div class="empresa-btns">
      <label class="emp-btn" id="btn-laser" onclick="selEmpresa('LASER')">
        <input type="radio" name="empresa" value="LASER" />
        ⚡ LÁSER
      </label>
      <label class="emp-btn" id="btn-corte" onclick="selEmpresa('CORTE Y DOBLADO')">
        <input type="radio" name="empresa" value="CORTE Y DOBLADO" />
        ⚙️ CORTE Y DOBLADO
      </label>
    </div>
  </div>

  <!-- FORMULARIO (aparece al seleccionar empresa) -->
  <div id="form-cuerpo">

    <!-- DATOS -->
    <div class="card" id="card-datos">
      <div class="card-title" id="title-datos">📋 Datos del cierre</div>
      <div class="grid2">
        <div class="campo">
          <label>Fecha <span class="req">*</span></label>
          <input type="date" id="fecha" required />
        </div>
        <div class="campo">
          <label>Encargado <span class="req">*</span></label>
          <input type="text" id="encargado" placeholder="Tu nombre" required />
        </div>
      </div>
    </div>

    <!-- MOVIMIENTOS -->
    <div class="card" id="card-mov">
      <div class="card-title" id="title-mov">💰 Movimientos del día</div>

      <div class="campo">
        <label>Saldo anterior (Gs)</label>
        <input type="number" id="saldo_anterior" placeholder="0" min="0" value="0" oninput="calcSaldoFinal()" />
      </div>

      <div class="grid2">
        <div class="campo">
          <label>Cobros al contado (Gs)</label>
          <input type="number" id="cobros_contado" placeholder="0" min="0" value="0" oninput="calcSaldoFinal()" />
        </div>
        <div class="campo">
          <label>Créditos cobrados (Gs)</label>
          <input type="number" id="creditos_cobrados" placeholder="0" min="0" value="0" oninput="calcSaldoFinal()" />
        </div>
      </div>

      <div class="campo">
        <label>Transferencias recibidas (Gs)</label>
        <input type="number" id="transferencias" placeholder="0" min="0" value="0" oninput="calcSaldoFinal()" />
      </div>

      <div class="grid2">
        <div class="campo">
          <label>Gastos del día (Gs)</label>
          <input type="number" id="gastos" placeholder="0" min="0" value="0" oninput="calcSaldoFinal()" />
        </div>
        <div class="campo">
          <label>Retiro del día (Gs)</label>
          <input type="number" id="retiro" placeholder="0" min="0" value="0" oninput="calcSaldoFinal()" />
        </div>
      </div>

      <div class="campo">
        <label>Observaciones</label>
        <input type="text" id="observaciones" placeholder="Notas del día (opcional)" />
      </div>
    </div>

    <!-- SALDO FINAL -->
    <div class="saldo-final-box" id="saldo-final-box">
      <span class="sf-lbl">💰 Saldo final del día:</span>
      <span class="sf-val" id="saldo-final-texto">Gs. 0</span>
    </div>

    <button class="btn" id="btn-enviar" onclick="enviar()">📊 Registrar cierre</button>
  </div>
</div>

<!-- PANTALLA ÉXITO -->
<div class="exito" id="pantalla-exito">
  <div class="big-icon">✅</div>
  <h2 id="exito-titulo">¡Cierre registrado!</h2>
  <p>El cierre del día fue enviado correctamente.</p>
  <button class="btn-otro" id="btn-otro" onclick="reiniciar()">📊 Registrar otro cierre</button>
</div>

<script>
  var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6L4spCxrYOk_luNvBw1AiqL-uw4mWGWM--kJg8Y1PXTTbsDVrAJoTsdnXldseOYHG/exec";
  var empresaActual = "";

  document.getElementById("fecha").valueAsDate = new Date();

  function selEmpresa(emp) {
    empresaActual = emp;
    var esLaser = emp === "LASER";

    // Header
    var hdr = document.getElementById("header");
    hdr.className = "header " + (esLaser ? "laser-hdr" : "corte-hdr");
    hdr.querySelector("h1").textContent = "Cierre del Día — " + (esLaser ? "LÁSER" : "CORTE Y DOBLADO");

    // Botones empresa
    document.getElementById("btn-laser").className = "emp-btn" + (esLaser ? " laser-sel" : "");
    document.getElementById("btn-corte").className = "emp-btn" + (!esLaser ? " corte-sel" : "");

    // Cuerpo
    document.getElementById("form-cuerpo").style.display = "block";

    // Cards
    var suf = esLaser ? "laser" : "corte";
    document.getElementById("card-datos").className = "card " + suf + "-card";
    document.getElementById("card-mov").className   = "card " + suf + "-card";
    document.getElementById("title-datos").className = "card-title " + suf + "-t";
    document.getElementById("title-mov").className   = "card-title " + suf + "-t";

    // Saldo box
    var sb = document.getElementById("saldo-final-box");
    sb.className = "saldo-final-box " + suf + "-sf";

    // Botón
    var btn = document.getElementById("btn-enviar");
    btn.className = "btn " + suf + "-btn";
    btn.innerHTML = (esLaser ? "⚡" : "⚙️") + " Registrar cierre";

    // Body
    document.body.className = suf + "-mode";

    calcSaldoFinal();
  }

  function n(id) { return parseFloat(document.getElementById(id).value) || 0; }

  function calcSaldoFinal() {
    var total = n("saldo_anterior") + n("cobros_contado") + n("creditos_cobrados") + n("transferencias")
              - n("gastos") - n("retiro");
    document.getElementById("saldo-final-texto").textContent =
      "Gs. " + total.toLocaleString("es-PY");
    // Guardar internamente para envío
    window._saldoFinal = total;
  }

  function enviar() {
    if (!empresaActual) { alert("⚠️ Seleccioná una empresa primero"); return; }
    var fecha     = document.getElementById("fecha").value;
    var encargado = document.getElementById("encargado").value.trim();

    if (!fecha || !encargado) {
      alert("⚠️ Completá todos los campos obligatorios (*)");
      return;
    }

    var btn = document.getElementById("btn-enviar");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Enviando...';

    var params = new URLSearchParams({
      tipo_formulario:   "cierre_metalin",
      empresa:           empresaActual,
      fecha:             fecha,
      encargado:         encargado,
      saldo_anterior:    n("saldo_anterior"),
      cobros_contado:    n("cobros_contado"),
      creditos_cobrados: n("creditos_cobrados"),
      transferencias:    n("transferencias"),
      gastos:            n("gastos"),
      retiro:            n("retiro"),
      saldo_final:       window._saldoFinal || 0,
      observaciones:     document.getElementById("observaciones").value.trim(),
      _t:                Date.now()
    });

    fetch(SCRIPT_URL + "?" + params.toString(), { method: "GET" })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.ok) {
          var esLaser = empresaActual === "LASER";
          var exito = document.getElementById("pantalla-exito");
          exito.className = "exito " + (esLaser ? "laser-ex" : "corte-ex");
          document.getElementById("exito-titulo").textContent =
            "¡Cierre de " + (esLaser ? "LÁSER" : "CORTE Y DOBLADO") + " registrado!";
          var btnOtro = document.getElementById("btn-otro");
          btnOtro.className = "btn-otro " + (esLaser ? "laser-ot" : "corte-ot");
          document.getElementById("formulario").style.display = "none";
          exito.style.display = "block";
        } else {
          alert("❌ Error: " + (d.error || "Respuesta inesperada"));
          btn.disabled = false;
          btn.innerHTML = "📊 Registrar cierre";
        }
      })
      .catch(function() {
        alert("❌ Error de conexión. Revisá tu internet.");
        btn.disabled = false;
        btn.innerHTML = "📊 Registrar cierre";
      });
  }

  function reiniciar() {
    document.getElementById("pantalla-exito").style.display = "none";
    document.getElementById("formulario").style.display = "block";
    document.getElementById("form-cuerpo").style.display = "none";
    document.getElementById("fecha").valueAsDate = new Date();
    document.getElementById("encargado").value = "";
    document.getElementById("observaciones").value = "";
    ["saldo_anterior","cobros_contado","creditos_cobrados","transferencias","gastos","retiro"]
      .forEach(function(id) { document.getElementById(id).value = "0"; });
    document.getElementById("saldo-final-texto").textContent = "Gs. 0";
    document.getElementById("btn-laser").className = "emp-btn";
    document.getElementById("btn-corte").className = "emp-btn";
    document.getElementById("header").className = "header";
    document.getElementById("header").querySelector("h1").textContent = "Cierre del Día — METAL-IN";
    document.body.className = "";
    empresaActual = "";
    var btn = document.getElementById("btn-enviar");
    btn.disabled = false;
    btn.innerHTML = "📊 Registrar cierre";
  }
</script>
</body>
</html>
