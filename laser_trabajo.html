<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuevo Trabajo — LÁSER</title>
  <!-- Cache-busting: fuerza recarga en cada visita -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --verde:    #117A65;
      --verde-cl: #D5F5E3;
      --verde-dk: #0E6655;
      --azul:     #1A5276;
      --laser:    #1A5276;
      --laser-cl: #D6EAF8;
      --laser-dk: #154360;
      --gris:     #F4F6F7;
      --borde:    #D5D8DC;
      --texto:    #1C2833;
      --sub:      #717D7E;
      --danger:   #C0392B;
      --radius:   12px;
      --sombra:   0 2px 16px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #EAF4FB;
      min-height: 100vh;
      padding: 24px 16px 48px;
      color: var(--texto);
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, var(--laser) 0%, var(--laser-dk) 100%);
      border-radius: var(--radius);
      padding: 28px 24px 22px;
      margin-bottom: 24px;
      color: #fff;
      text-align: center;
      box-shadow: 0 4px 20px rgba(26,82,118,0.3);
    }
    .header .emoji { font-size: 2.4rem; margin-bottom: 8px; display: block; }
    .header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.3px; }
    .header p  { font-size: 0.9rem; opacity: 0.85; margin-top: 4px; }

    /* ── Tarjeta sección ── */
    .card {
      background: #fff;
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: var(--sombra);
      border-left: 4px solid var(--laser);
    }
    .card-title {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--laser);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Campos ── */
    .campo { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--sub);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    label .req { color: var(--danger); margin-left: 2px; }

    input[type="text"],
    input[type="date"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--borde);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--texto);
      background: #FDFEFE;
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--laser);
      box-shadow: 0 0 0 3px rgba(26,82,118,0.12);
      background: #fff;
    }
    textarea { resize: vertical; min-height: 80px; }

    /* ── Grid 2 col ── */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 500px) { .grid2 { grid-template-columns: 1fr; } }

    /* ── Radio condición ── */
    .radio-group { display: flex; gap: 12px; flex-wrap: wrap; }
    .radio-btn {
      flex: 1; min-width: 120px;
      border: 2px solid var(--borde);
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      background: #fff;
    }
    .radio-btn input { display: none; }
    .radio-btn:has(input:checked) {
      border-color: var(--laser);
      background: var(--laser-cl);
      color: var(--laser-dk);
    }

    /* ── Saldo box ── */
    .saldo-box {
      background: var(--laser-cl);
      border: 2px solid var(--laser);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4px;
    }
    .saldo-box span { font-size: 0.85rem; font-weight: 600; color: var(--laser-dk); }
    .saldo-box strong { font-size: 1.2rem; font-weight: 700; color: var(--laser-dk); }

    /* ── Botón ── */
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--laser) 0%, var(--laser-dk) 100%);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 14px rgba(26,82,118,0.3);
    }
    .btn:active { transform: scale(0.98); opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Éxito ── */
    .exito {
      display: none;
      background: #fff;
      border-radius: var(--radius);
      padding: 40px 24px;
      text-align: center;
      box-shadow: var(--sombra);
      border-top: 5px solid var(--laser);
    }
    .exito .big-icon { font-size: 3.5rem; margin-bottom: 12px; }
    .exito h2 { font-size: 1.3rem; font-weight: 700; color: var(--laser-dk); margin-bottom: 8px; }
    .exito p  { font-size: 0.9rem; color: var(--sub); margin-bottom: 24px; }
    .btn-otro {
      display: inline-block;
      padding: 12px 28px;
      background: var(--laser-cl);
      color: var(--laser-dk);
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      border: 2px solid var(--laser);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Entrega (oculta por defecto) ── */
    #bloque-entrega { display: none; }
  </style>
</head>
<body>

<div id="formulario">
  <div class="header">
    <span class="emoji">⚡</span>
    <h1>Nuevo Trabajo — LÁSER</h1>
    <p>Registrar pedido de cliente</p>
  </div>

  <!-- DATOS GENERALES -->
  <div class="card">
    <div class="card-title">📋 Datos del trabajo</div>

    <div class="grid2">
      <div class="campo">
        <label>Fecha <span class="req">*</span></label>
        <input type="date" id="fecha" required />
      </div>
      <div class="campo">
        <label>Encargado <span class="req">*</span></label>
        <input type="text" id="encargado" placeholder="Tu nombre" required />
      </div>
    </div>

    <div class="campo">
      <label>Cliente <span class="req">*</span></label>
      <input type="text" id="cliente" placeholder="Nombre del cliente" required />
    </div>
  </div>

  <!-- DESCRIPCIÓN -->
  <div class="card">
    <div class="card-title">⚡ Descripción del trabajo</div>

    <div class="campo">
      <label>Descripción / Referencia del archivo <span class="req">*</span></label>
      <textarea id="descripcion" placeholder="Describí el trabajo (ej: Corte letras ACERO 2mm)" required></textarea>
    </div>

    <div class="grid2">
      <div class="campo">
        <label>Material / Espesor</label>
        <input type="text" id="material" placeholder="Ej: Acero 2mm" />
      </div>
      <div class="campo">
        <label>Cantidad de piezas</label>
        <input type="number" id="cantidad" placeholder="Ej: 10" min="1" />
      </div>
    </div>
  </div>

  <!-- PRECIO Y PAGO -->
  <div class="card">
    <div class="card-title">💰 Precio y forma de pago</div>

    <div class="campo">
      <label>Precio total presupuestado (Gs) <span class="req">*</span></label>
      <input type="number" id="precio" placeholder="0" min="0" required />
    </div>

    <div class="campo">
      <label>Condición de pago <span class="req">*</span></label>
      <div class="radio-group">
        <label class="radio-btn">
          <input type="radio" name="condicion" value="Contado" checked onchange="toggleEntrega()" />
          💵 Contado
        </label>
        <label class="radio-btn">
          <input type="radio" name="condicion" value="Credito" onchange="toggleEntrega()" />
          💳 Crédito
        </label>
      </div>
    </div>

    <div id="bloque-entrega">
      <div class="campo">
        <label>Entrega inicial (Gs)</label>
        <input type="number" id="entrega" placeholder="0" min="0" value="0" oninput="calcSaldo()" />
      </div>
      <div class="saldo-box">
        <span>Saldo pendiente:</span>
        <strong id="saldo-texto">Gs. 0</strong>
      </div>
    </div>

    <div class="campo" style="margin-top:16px;">
      <label>Fecha estimada de entrega</label>
      <input type="date" id="fecha-entrega" />
    </div>

    <div class="campo">
      <label>Observaciones</label>
      <textarea id="observaciones" placeholder="Notas adicionales (opcional)"></textarea>
    </div>
  </div>

  <button class="btn" id="btn-enviar" onclick="enviar()">⚡ Registrar trabajo</button>
</div>

<!-- PANTALLA ÉXITO -->
<div class="exito" id="pantalla-exito">
  <div class="big-icon">⚡</div>
  <h2>¡Trabajo registrado!</h2>
  <p>El pedido fue enviado correctamente a administración.</p>
  <button class="btn-otro" onclick="reiniciar()">⚡ Registrar otro trabajo</button>
</div>

<script>
  // ── URL del script (siempre la misma, sin cambiar) ──────────
  var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyeLmGL7IuvlzFia0lwlIaFmw62mH9HtBPDKAWx6k17CWp7tPxhYtbMvacs91NsIww2/exec";

  // ── Fecha de hoy por defecto ─────────────────────────────────
  document.getElementById("fecha").valueAsDate = new Date();

  // ── Mostrar/ocultar bloque entrega según condición ───────────
  function toggleEntrega() {
    var cond = document.querySelector('input[name="condicion"]:checked').value;
    document.getElementById("bloque-entrega").style.display =
      cond === "Credito" ? "block" : "none";
    if (cond !== "Credito") {
      document.getElementById("entrega").value = "0";
      calcSaldo();
    }
  }

  // ── Calcular saldo ───────────────────────────────────────────
  function calcSaldo() {
    var precio  = parseFloat(document.getElementById("precio").value)  || 0;
    var entrega = parseFloat(document.getElementById("entrega").value) || 0;
    var saldo   = Math.max(0, precio - entrega);
    document.getElementById("saldo-texto").textContent =
      "Gs. " + saldo.toLocaleString("es-PY");
  }
  document.getElementById("precio").addEventListener("input", calcSaldo);

  // ── Enviar ───────────────────────────────────────────────────
  function enviar() {
    var fecha       = document.getElementById("fecha").value;
    var encargado   = document.getElementById("encargado").value.trim();
    var cliente     = document.getElementById("cliente").value.trim();
    var descripcion = document.getElementById("descripcion").value.trim();
    var precio      = document.getElementById("precio").value;
    var condicion   = document.querySelector('input[name="condicion"]:checked').value;
    var entrega     = document.getElementById("entrega").value || "0";
    var material    = document.getElementById("material").value.trim();
    var cantidad    = document.getElementById("cantidad").value;
    var observaciones = document.getElementById("observaciones").value.trim();

    // Armar descripción completa
    var descFinal = descripcion;
    if (material)  descFinal += " | Material: " + material;
    if (cantidad)  descFinal += " | Cantidad: " + cantidad;

    if (!fecha || !encargado || !cliente || !descripcion || !precio) {
      alert("⚠️ Completá todos los campos obligatorios (*)");
      return;
    }

    var btn = document.getElementById("btn-enviar");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Enviando...';

    var params = new URLSearchParams({
      tipo_formulario: "nuevo_trabajo",
      empresa:         "LASER",
      fecha:           fecha,
      encargado:       encargado,
      cliente:         cliente,
      descripcion:     descFinal,
      precio:          precio,
      condicion:       condicion,
      entrega:         entrega,
      observaciones:   observaciones,
      _t:              Date.now()   // cache-buster en cada envío
    });

    fetch(SCRIPT_URL + "?" + params.toString(), { method: "GET" })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.ok) {
          document.getElementById("formulario").style.display = "none";
          document.getElementById("pantalla-exito").style.display = "block";
        } else {
          alert("❌ Error: " + (d.error || "Respuesta inesperada"));
          btn.disabled = false;
          btn.innerHTML = "⚡ Registrar trabajo";
        }
      })
      .catch(function(err) {
        alert("❌ Error de conexión. Revisá tu internet.");
        btn.disabled = false;
        btn.innerHTML = "⚡ Registrar trabajo";
      });
  }

  // ── Reiniciar formulario ─────────────────────────────────────
  function reiniciar() {
    document.getElementById("pantalla-exito").style.display = "none";
    document.getElementById("formulario").style.display = "block";
    document.getElementById("fecha").valueAsDate = new Date();
    document.getElementById("encargado").value = "";
    document.getElementById("cliente").value = "";
    document.getElementById("descripcion").value = "";
    document.getElementById("material").value = "";
    document.getElementById("cantidad").value = "";
    document.getElementById("precio").value = "";
    document.getElementById("entrega").value = "0";
    document.getElementById("observaciones").value = "";
    document.getElementById("fecha-entrega").value = "";
    document.querySelector('input[name="condicion"][value="Contado"]').checked = true;
    toggleEntrega();
    var btn = document.getElementById("btn-enviar");
    btn.disabled = false;
    btn.innerHTML = "⚡ Registrar trabajo";
  }
</script>
</body>
</html>
