<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nuevo Trabajo — LÁSER</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--c:#1A5276;--cl:#D6EAF8;--dk:#154360;--borde:#D5D8DC;--sub:#717D7E;--danger:#C0392B;--r:12px;--s:0 2px 16px rgba(0,0,0,0.08)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#EAF4FB;min-height:100vh;padding:20px 16px 48px;color:#1C2833}
    .hdr{background:linear-gradient(135deg,var(--c),var(--dk));border-radius:var(--r);padding:26px 22px 20px;margin-bottom:20px;color:#fff;text-align:center;box-shadow:0 4px 20px rgba(26,82,118,0.3)}
    .hdr .ico{font-size:2.2rem;display:block;margin-bottom:7px}
    .hdr h1{font-size:1.4rem;font-weight:700}
    .hdr p{font-size:0.87rem;opacity:0.85;margin-top:3px}
    .card{background:#fff;border-radius:var(--r);padding:22px;margin-bottom:14px;box-shadow:var(--s);border-left:4px solid var(--c)}
    .ct{font-size:0.74rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--c);margin-bottom:16px}
    .campo{margin-bottom:14px}
    label{display:block;font-size:0.78rem;font-weight:600;color:var(--sub);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px}
    .req{color:var(--danger)}
    input,textarea,select{width:100%;padding:11px 13px;border:1.5px solid var(--borde);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.94rem;color:#1C2833;background:#FDFEFE;transition:border-color 0.2s}
    input:focus,textarea:focus,select:focus{outline:none;border-color:var(--c);box-shadow:0 0 0 3px rgba(26,82,118,0.1)}
    textarea{resize:vertical;min-height:75px}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:480px){.g2{grid-template-columns:1fr}}
    .radio-group{display:flex;gap:10px;flex-wrap:wrap}
    .rbtn{flex:1;min-width:110px;border:2px solid var(--borde);border-radius:10px;padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;font-weight:600;font-size:0.88rem;background:#fff;transition:all 0.2s}
    .rbtn input{display:none}
    .rbtn.sel{border-color:var(--c);background:var(--cl);color:var(--dk)}
    #bloque-entrega{display:none}
    .saldo-box{background:var(--cl);border:2px solid var(--c);border-radius:10px;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:4px}
    .saldo-box span{font-size:0.83rem;font-weight:600;color:var(--dk)}
    .saldo-box strong{font-size:1.15rem;font-weight:700;color:var(--dk)}
    .btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--c),var(--dk));color:#fff;border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(26,82,118,0.3);transition:all 0.2s}
    .btn:active{transform:scale(0.98)}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .exito{display:none;background:#fff;border-radius:var(--r);padding:40px 22px;text-align:center;box-shadow:var(--s);border-top:5px solid var(--c)}
    .exito .big{font-size:3.5rem;margin-bottom:12px}
    .exito h2{font-size:1.25rem;font-weight:700;color:var(--dk);margin-bottom:8px}
    .exito p{font-size:0.88rem;color:var(--sub);margin-bottom:22px}
    .btn-otro{display:inline-block;padding:11px 26px;background:var(--cl);color:var(--dk);border-radius:10px;font-weight:700;cursor:pointer;border:2px solid var(--c);font-family:'DM Sans',sans-serif;font-size:0.93rem}
    .spin{display:inline-block;width:17px;height:17px;border:3px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:sp 0.7s linear infinite;vertical-align:middle;margin-right:7px}
    @keyframes sp{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="form">
  <div class="hdr">
    <span class="ico">⚡</span>
    <h1>Nuevo Trabajo — LÁSER</h1>
    <p>Registrar pedido de cliente</p>
  </div>
  <div class="card">
    <div class="ct">📋 Datos del trabajo</div>
    <div class="g2">
      <div class="campo"><label>Fecha <span class="req">*</span></label><input type="date" id="fecha"/></div>
      <div class="campo"><label>Encargado <span class="req">*</span></label><input type="text" id="encargado" placeholder="Tu nombre"/></div>
    </div>
    <div class="campo"><label>Cliente <span class="req">*</span></label><input type="text" id="cliente" placeholder="Nombre del cliente"/></div>
  </div>
  <div class="card">
    <div class="ct">⚡ Descripción del trabajo</div>
    <div class="campo"><label>Descripción / Referencia <span class="req">*</span></label><textarea id="descripcion" placeholder="Describí el trabajo (ej: Corte letras ACERO 2mm)"></textarea></div>
    <div class="g2">
      <div class="campo"><label>Material / Espesor</label><input type="text" id="material" placeholder="Ej: Acero 2mm"/></div>
      <div class="campo"><label>Cantidad de piezas</label><input type="number" id="cantidad" placeholder="Ej: 10" min="1"/></div>
    </div>
  </div>
  <div class="card">
    <div class="ct">💰 Precio y forma de pago</div>
    <div class="campo"><label>Precio total (Gs) <span class="req">*</span></label><input type="number" id="precio" placeholder="0" min="0"/></div>
    <div class="campo">
      <label>Condición de pago <span class="req">*</span></label>
      <div class="radio-group">
        <button type="button" class="rbtn sel" id="btn-contado" onclick="selCond('Contado')">💵 Contado</button>
        <button type="button" class="rbtn" id="btn-credito" onclick="selCond('Credito')">💳 Crédito</button>
      </div>
      <input type="hidden" id="condicion" value="Contado"/>
    </div>
    <div id="bloque-entrega">
      <div class="campo"><label>Entrega inicial (Gs)</label><input type="number" id="entrega" placeholder="0" min="0" value="0" oninput="calcSaldo()"/></div>
      <div class="saldo-box"><span>Saldo pendiente:</span><strong id="saldo-txt">Gs. 0</strong></div>
    </div>
    <div class="campo" style="margin-top:14px"><label>Fecha estimada de entrega</label><input type="date" id="fecha-entrega"/></div>
    <div class="campo"><label>Observaciones</label><textarea id="obs" placeholder="Notas adicionales (opcional)"></textarea></div>
  </div>
  <button class="btn" id="btn-env" onclick="enviar()">⚡ Registrar trabajo</button>
</div>
<div class="exito" id="exito">
  <div class="big">⚡</div>
  <h2>¡Trabajo registrado!</h2>
  <p>El pedido fue enviado correctamente a administración.</p>
  <button class="btn-otro" onclick="reiniciar()">⚡ Registrar otro trabajo</button>
</div>
<script>
var URL = "https://script.google.com/macros/s/AKfycbyeLmGL7IuvlzFia0lwlIaFmw62mH9HtBPDKAWx6k17CWp7tPxhYtbMvacs91NsIww2/exec";
document.getElementById("fecha").valueAsDate = new Date();
// Marcar Contado como seleccionado al inicio
document.querySelector('.rbtn').classList.add("sel");

function selCond(val){
document.getElementById(“condicion”).value = val;
document.getElementById(“btn-contado”).classList.toggle(“sel”, val===“Contado”);
document.getElementById(“btn-credito”).classList.toggle(“sel”, val===“Credito”);
document.getElementById(“bloque-entrega”).style.display = val===“Credito”?“block”:“none”;
if(val!==“Credito”){document.getElementById(“entrega”).value=“0”;calcSaldo();}
}
function calcSaldo(){
var p=parseFloat(document.getElementById(“precio”).value)||0;
var e=parseFloat(document.getElementById(“entrega”).value)||0;
document.getElementById(“saldo-txt”).textContent=“Gs. “+Math.max(0,p-e).toLocaleString(“es-PY”);
}
document.getElementById(“precio”).addEventListener(“input”,calcSaldo);

function enviar(){
var fecha=document.getElementById(“fecha”).value;
var enc=document.getElementById(“encargado”).value.trim();
var cli=document.getElementById(“cliente”).value.trim();
var desc=document.getElementById(“descripcion”).value.trim();
var precio=document.getElementById(“precio”).value;
var cond=document.getElementById(“condicion”).value;
var entrega=document.getElementById(“entrega”).value||“0”;
var mat=document.getElementById(“material”).value.trim();
var cant=document.getElementById(“cantidad”).value;
var obs=document.getElementById(“obs”).value.trim();

if(!fecha||!enc||!cli||!desc||!precio){alert(“⚠️ Completá los campos obligatorios (*)”);return;}

var descFinal=desc;
if(mat) descFinal+=” | Material: “+mat;
if(cant) descFinal+=” | Cantidad: “+cant;

var btn=document.getElementById(“btn-env”);
btn.disabled=true;
btn.innerHTML=’<span class="spin"></span>Enviando…’;

var params=new URLSearchParams({
tipo_formulario:“nuevo_trabajo”,
empresa:“LASER”,
fecha:fecha, encargado:enc, cliente:cli,
descripcion:descFinal, precio:precio,
condicion:cond, entrega:entrega,
observaciones:obs, _t:Date.now()
});

fetch(URL, {method:“POST”, mode:“no-cors”, body:params})
.then(function(){
document.getElementById(“form”).style.display=“none”;
document.getElementById(“exito”).style.display=“block”;
})
.catch(function(){
alert(“❌ Error de conexión.”);
btn.disabled=false;
btn.innerHTML=“⚡ Registrar trabajo”;
});
}

function reiniciar(){
document.getElementById(“exito”).style.display=“none”;
document.getElementById(“form”).style.display=“block”;
document.getElementById(“fecha”).valueAsDate=new Date();
[“encargado”,“cliente”,“descripcion”,“material”,“cantidad”,“precio”,“entrega”,“obs”,“fecha-entrega”]
.forEach(function(id){document.getElementById(id).value=””;});
selCond(“Contado”);
var btn=document.getElementById(“btn-env”);
btn.disabled=false;
btn.innerHTML=“⚡ Registrar trabajo”;
}
</script>

</body>
</html>
